name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Rust 工具链
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # 缓存依赖（加速构建）
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('*0/Cargo.lock') }}

      # 检查代码格式
      - name: Check format
        run: cargo fmt --check

      # Clippy 静态分析
      - name: Clippy
        run: cargo clippy -- -D warnings

      # 编译
      - name: Build
        run: cargo build --verbose

      # 运行测试
      - name: Test
        run: cargo test --verbose